<!DOCTYPE html>
<html lang="ja">
<head>

</head>
<body>

<h1>下着ブランド診断</h1>

<!-- 好み -->
<h3>好み</h3>
<label><input type="checkbox" value="かわいい系"> かわいい系</label>
<label><input type="checkbox" value="ナチュラル"> ナチュラル</label>
<label><input type="checkbox" value="デザイン重視"> デザイン重視</label>

<!-- 機能 -->
<h3>機能</h3>
<label><input type="checkbox" value="ホールド力重視"> ホールド力重視</label>
<label><input type="checkbox" value="補整重視"> 補整重視</label>
<label><input type="checkbox" value="楽ちん"> 楽ちん</label>

<h3>体型</h3>

<br><br>

<!-- 価格 -->

<input type="range" id="priceRange" min="1" max="3" value="2">

<br>

<button onclick="filterBrands()">診断する</button>

<div id="result"></div>
